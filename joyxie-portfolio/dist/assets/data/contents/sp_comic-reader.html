<h3>功能介紹</h3>
<p>為了將一張一張斷掉的手機漫畫圖片，連接起來閱讀，而製作的工具。</p>

<h4>前置準備</h4>
<p>漫畫圖檔名稱須為整齊含固定長度編號的名稱，例如：</p>
<ul>
    <li>image_001.jpg</li>
    <li>image_002.jpg</li>
    <li>...</li>
    <li>image_010.jpg</li>
</ul>

<h4>介面樣式</h4>
<ul>
    <li>白天模式（預設）</li>
    <li>夜間模式</li>
</ul>

<h4>使用方法</h4>
<p>點擊「選擇檔案」按鈕，選擇「漫畫單話」資料夾，例如：第一話。</p>
