        <h3>使用滑鼠操作</h3>
        <ul>
            <li>拾起物品：點擊畫面中可拾起的物品，會放至下方工具列</li>
            <li>放置物品：從工具列拖曳物品到畫面中</li>
        </ul>

        <h3>遊戲關卡類型</h3>
        <p>遊戲觸發事件總共分為三種類型，分別為「偵測型」、「密碼型」及「放置型」。</p>

        <h4>偵測型事件</h4>
        <p>工具列中需有特定物品，才可開啟隱藏畫面。</p>

        <h6>▼ 沒有道具「燈」</h6>
        <div class="img-wrap">
            <picture>
                <source srcset="dist/assets/images/webps/escape/escape_room_game_8.webp" type="image/webp">
                <img src="dist/assets/images/work/escape/escape_room_game_8.png" />
            </picture>
        </div>

        <h6>▼ 有道具「燈」，可進入左右通道</h6>
        <div class="img-wrap">
            <picture>
                <source srcset="dist/assets/images/webps/escape/escape_room_game_9.webp" type="image/webp">
                <img src="dist/assets/images/work/escape/escape_room_game_9.png" />
            </picture>
        </div>

        <h4>密碼型事件</h4>
        <p>需輸入正確的數字，才可開啟隱藏畫面。</p>
        <h6>▼ 輸入正確「份量」</h6>
        <div class="img-wrap">
            <picture>
                <source srcset="dist/assets/images/webps/escape/escape_room_game_10.webp" type="image/webp">
                <img src="dist/assets/images/work/escape/escape_room_game_10.png" />
            </picture>
        </div>

        <h6>▼ 進入隱藏畫面</h6>
        <div class="img-wrap">
            <picture>
                <source srcset="dist/assets/images/webps/escape/escape_room_game_11.webp" type="image/webp">
                <img src="dist/assets/images/work/escape/escape_room_game_11.png" />
            </picture>
        </div>

        <h4>放置型事件</h4>
        <p>須將正確的物品拖曳至正確的畫面位置中，才可觸發特定事件。</p>
        <h6>▼ 給小老鼠喝「湯」</h6>
