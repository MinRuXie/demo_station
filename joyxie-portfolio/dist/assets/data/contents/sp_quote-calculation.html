<h3>功能介紹</h3>

<h4>報價計算機</h4>
<p>輸入 實領金額 推導出 報價金額。</p>

<div class="block-wrap">
    <p>最終實領(支領淨額) + 健保費 + 所得稅 = 報價(支領金額)</p>
    <p>X -0.0211X -0.1X = (1 -0.1 -0.0211)X</p>
</div>

<h4>最終實領計算機</h4>
<p>輸入 報價(支領金額) 推導出 最終實領(支領淨額)</p>

<div class="block-wrap">
    <p>報價(支領金額) - 健保費 - 所得稅 = 最終實領(支領淨額)</p>
    <p>X/(1 -0.1 -0.0211) - 0.1X/(1 -0.1 -0.0211) - 0.0211X/(1 -0.1 -0.0211) = X</p>
</div>
