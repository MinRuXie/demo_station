<h4>功能介紹</h4>
<ul>
    <li>注意！遊戲內有音效</li>
    <li>每次開局都隨機 12 種圖案 (24張) 的翻翻牌對對碰遊戲，以 3 列 8 欄的方式排列卡片。</li>
    <li>遊戲規則：一次可以翻開兩張卡片，連續翻開兩張一樣的圖案即可消除卡片，否則卡片將翻回背面。</li>
    <li>破關條件：場上所有卡片都消失後即可獲勝。</li>
    <li>成績為計時制：按下開始遊戲後即開始計時，遊戲時間不限制，但花費越少秒數，遊戲排名將越高。</li>
    <li>重新開始：每次重新開始都會再重新選出 12 種圖案並打亂排序。</li>
</ul>
